<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Scan History — MediScan AI</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: var(--bg-deep);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        .history-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px 100px;
        }

        .history-head {
            margin-bottom: 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 40px;
        }

        .filter-tabs {
            display: flex;
            gap: 12px;
            background: var(--bg-card);
            padding: 8px;
            border-radius: 50px;
            border: 1px solid var(--border);
            width: fit-content;
            margin-bottom: 40px;
            backdrop-filter: blur(20px);
        }

        .filter-tab {
            padding: 12px 28px;
            border-radius: 50px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            font-size: .9rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.4s var(--spring);
        }

        .filter-tab:hover {
            color: var(--text);
        }

        .filter-tab.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-vibrant));
            color: #020617;
            box-shadow: 0 8px 20px -4px rgba(34, 211, 238, 0.4);
        }

        .hist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 32px;
        }

        .hist-card {
            position: relative;
            padding: 32px;
            background: var(--bg-card);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            transition: all 0.5s var(--spring);
            overflow: hidden;
        }

        .hist-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .hist-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent-glow);
            box-shadow: 0 32px 64px -16px rgba(0, 0, 0, 0.6);
        }

        .hist-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .hist-badge {
            padding: 6px 16px;
            border-radius: 50px;
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
        }

        .badge-scan {
            background: rgba(34, 211, 238, 0.1);
            color: var(--accent);
            border: 1px solid var(--border-glow);
        }

        .badge-rx {
            background: rgba(168, 85, 247, 0.1);
            color: var(--accent-soft);
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .hist-conf {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .hist-findings {
            font-size: .9rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .hist-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: .8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .hist-del-btn {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: .8rem;
            font-weight: 700;
            transition: all 0.3s;
        }

        .hist-del-btn:hover {
            background: var(--danger);
            color: #fff;
            border-color: transparent;
            transform: scale(1.05);
        }

        .stat-pill {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 24px;
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.4s var(--gentle);
        }

        .stat-pill:hover {
            transform: translateY(-4px);
            border-color: var(--accent-glow);
        }

        .stat-pill-val {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
        }

        .stat-pill-label {
            font-size: .8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .search-container {
            position: relative;
            width: 350px;
        }

        .search-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 50px;
            padding: 16px 28px;
            font-size: .95rem;
            transition: all 0.4s;
        }

        .search-input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px var(--accent-glow);
            outline: none;
        }

        @media (max-width: 768px) {
            .history-head {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .search-container {
                width: 100%;
            }

            .hist-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav>
        <a class="nav-brand" href="index.html">
            <svg class="nav-logo" viewBox="0 0 38 38" fill="none">
                <circle cx="19" cy="19" r="18" stroke="#00c8ff" stroke-width="1.5" fill="rgba(0,200,255,.06)" />
                <path d="M19 10v18M10 19h18" stroke="#00c8ff" stroke-width="2.5" stroke-linecap="round" />
                <circle cx="19" cy="19" r="4" fill="#00c8ff" opacity=".7" />
            </svg>
            <div><span class="nav-title">MediScan AI</span><span class="nav-subtitle">Clinical Decision Support</span>
            </div>
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">🏠 Dashboard</a>
            <a href="history.html" class="nav-link active">📋 History</a>
        </div>
    </nav>

    <div class="history-page">
        <div class="history-head">
            <div>
                <h1
                    style="font-size:2.8rem;font-weight:900;background:linear-gradient(135deg, #fff, #94a3b8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;font-family:'Outfit', sans-serif">
                    Scan History
                </h1>
                <p style="color:var(--text-muted);font-size:1rem;font-weight:500">
                    Comprehensive clinical audit path for scanning records.
                </p>
            </div>
            <div class="search-container">
                <input id="histSearch" type="text" class="search-input" placeholder="🔍 Search records…">
            </div>
        </div>

        <!-- Filter Tabs -->
        <div
            style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All Records</button>
                <button class="filter-tab" data-filter="scan">🔬 Scans</button>
                <button class="filter-tab" data-filter="rx">💊 Prescriptions</button>
            </div>
            <div style="display:flex;gap:12px">
                <button class="btn btn-outline btn-sm" id="clearAllBtn"
                    style="color:#ff4d6d;border-color:rgba(255,77,109,0.2)">🗑 Clear Store</button>
                <a href="index.html" class="btn btn-primary btn-sm" style="padding:10px 20px">+ New Diagnostic</a>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row" id="historyStats" style="margin-bottom:40px"></div>

        <!-- Cards Grid -->
        <div id="historyContent">
            <div class="empty-state">
                <span class="empty-icon" style="opacity:0.3">📋</span>
                <p>Initializing historical context…</p>
            </div>
        </div>
    </div>

    <script>
        let allScans = [];
        let activeFilter = 'all';

        const SCAN_ICONS = {
            'Chest X-Ray': '🫁', 'Brain CT/MRI': '🧠', 'Brain CT': '🧠', 'Brain MRI': '🧠',
            'Bone X-Ray': '🦴', 'Abdomen CT': '🍱', 'Spine X-Ray': '🦴',
            'Dental OPG': '🦷', 'Prescription': '🧾', 'Medical Image': '🏥'
        };

        async function loadHistory() {
            try {
                const r = await fetch('/api/history');
                allScans = await r.json();
                if (allScans.error) throw new Error(allScans.error);
                renderStats(allScans);
                renderCards(allScans);
            } catch (e) {
                document.getElementById('historyContent').innerHTML = `<div class="empty-state"><span class="empty-icon">⚠️</span><p>Connection lost: ${e.message}</p></div>`;
            }
        }

        function renderStats(scans) {
            const total = scans.length;
            const rxCount = scans.filter(s => s.scan_type === 'Prescription').length;
            const avgConf = total ? (scans.reduce((sum, s) => sum + s.confidence, 0) / total).toFixed(1) : '—';
            const highConf = scans.filter(s => s.confidence >= 90).length;
            document.getElementById('historyStats').innerHTML = [
                ['📊 Total Audit', total, '#fff'],
                ['🔬 Diagnostics', total - rxCount, 'var(--accent)'],
                ['🧾 Scripts', rxCount, 'var(--accent3)'],
                ['🎯 Accuracy', avgConf + '%', 'var(--warning)'],
                ['✅ Validated', highConf, 'var(--success)'],
            ].map(([label, val, color]) => `
        <div class="stat-pill glass">
          <div class="stat-pill-val" style="color:${color}">${val}</div>
          <div class="stat-pill-label">${label}</div>
        </div>`).join('');
        }

        function renderCards(scans) {
            const wrap = document.getElementById('historyContent');
            if (!scans.length) {
                wrap.innerHTML = `<div class="empty-state"><span class="empty-icon" style="opacity:0.2">📭</span><p>No historical records found. <a href="/" style="color:var(--accent);font-weight:600">Start a new scan →</a></p></div>`;
                return;
            }
            wrap.innerHTML = `<div class="hist-grid">${scans.map((s, idx) => {
                const dt = new Date(s.timestamp);
                const dateStr = dt.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
                const timeStr = dt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
                const isRx = s.scan_type === 'Prescription';
                const icon = SCAN_ICONS[s.scan_type] || '🏥';
                const findings = s.result?.findings || [];
                const condition = s.result?.condition || (isRx ? 'Prescription Analysis' : '');

                let findStr = '';
                if (isRx) {
                    findStr = Array.isArray(findings) ? findings.join(', ') : (s.result?.summary || '—');
                } else {
                    findStr = `${condition}: ${findings.slice(0, 2).join(', ')}${findings.length > 2 ? '...' : ''}`;
                }

                const confColor = s.confidence >= 90 ? 'var(--success)' : s.confidence >= 70 ? 'var(--warning)' : 'var(--danger)';

                return `
          <div class="hist-card glass" style="animation: fadeIn .4s ease both ${idx * 0.05}s">
            <div class="hist-card-top">
              <div style="display:flex;align-items:center;gap:12px">
                <span style="font-size:1.5rem">${icon}</span>
                <span class="hist-badge ${isRx ? 'badge-rx' : 'badge-scan'}">${s.scan_type}</span>
              </div>
              <span class="hist-conf" style="color:${confColor}">${s.confidence.toFixed(1)}%</span>
            </div>
            <div style="font-weight:700;font-size:1.1rem;margin-bottom:8px;color:#fff">${condition || 'General Analysis'}</div>
            <div class="hist-findings">${findStr}</div>
            <div class="hist-meta">
              <div class="hist-dt"><span>📅</span> ${dateStr} · ${timeStr}</div>
              <button class="hist-del-btn" onclick="deleteRecord(${s.id},this)">🗑 Delete</button>
            </div>
          </div>`;
            }).join('')}</div>`;
        }

        function toggleExpand(btn) {
            const body = btn.nextElementSibling;
            const open = body.style.display === 'block';
            body.style.display = open ? 'none' : 'block';
            btn.textContent = open ? '▼ View Full Report' : '▲ Hide Report';
        }

        async function deleteRecord(id, btn) {
            if (!confirm('Delete this record?')) return;
            btn.textContent = '⏳'; btn.disabled = true;
            await fetch('/api/history/delete/' + id, { method: 'DELETE' });
            allScans = allScans.filter(s => s.id !== id);
            renderStats(allScans); applyFilter();
        }

        function applyFilter() {
            const q = document.getElementById('histSearch').value.toLowerCase();
            let filtered = allScans;
            if (activeFilter === 'scan') filtered = filtered.filter(s => s.scan_type !== 'Prescription');
            if (activeFilter === 'rx') filtered = filtered.filter(s => s.scan_type === 'Prescription');
            if (q) filtered = filtered.filter(s =>
                s.scan_type.toLowerCase().includes(q) ||
                s.filename.toLowerCase().includes(q) ||
                JSON.stringify(s.result).toLowerCase().includes(q));
            renderCards(filtered);
        }

        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeFilter = tab.dataset.filter;
                applyFilter();
            });
        });

        document.getElementById('histSearch').addEventListener('input', applyFilter);

        document.getElementById('clearAllBtn').addEventListener('click', async () => {
            if (!confirm('Delete ALL scan history? This cannot be undone.')) return;
            await fetch('/api/history/clear', { method: 'DELETE' });
            allScans = []; renderStats([]); applyFilter();
        });

        loadHistory();
    </script>
</body>

</html>
